<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Gallery Premium</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">NEON<span style="color:#b026ff;">GALLERY</span></div>

    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#video">Video</a>
      <a href="#gallery">Gallery</a>
      <a href="#cta">Join</a>
    </div>

    <a href="#gallery" class="btn">Explore</a>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="container hero-content fade-up">
    <h1>Premium <span>Neon</span> Media Experience</h1>
    <p>Glassmorphism UI + Neon Purple aesthetic + cinematic gallery system</p>
    <a href="#gallery" class="btn">View Gallery</a>
  </div>

  <div class="hero-image fade-up">
    <img src="https://images.unsplash.com/photo-1520975922284-3a2d0a6c5a15" alt="">
  </div>
</section>

<!-- VIDEO -->
<section class="video-section" id="video">
  <div class="container">
    <h2 class="section-title fade-up">Featured <span>Videos</span></h2>
    <div class="video-grid" id="videoGrid"></div>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
  <div class="container">
    <h2 class="section-title fade-up">Photo <span>Gallery</span></h2>
    <div class="masonry" id="masonry"></div>
  </div>
</section>

<!-- CTA -->
<section class="cta" id="cta">
  <div class="container">
    <div class="cta-box fade-up">
      <h2>Join the <span>Neon Era</span></h2>
      <p>Exclusive premium media collection access</p>
      <a href="#" class="btn">Get Started</a>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 <span>NeonGallery</span></p>
</footer>

<script src="script.js"></script>
</body>
</html>
